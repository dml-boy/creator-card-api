openapi: 3.0.0
info:
  title: Creator Card Microservice API
  description: >
    REST API that lets creators publish a shareable profile card showcasing
    their links and service rates.
  version: 1.0.0
servers:
  - url: http://localhost:8811
    description: Local Development Server
paths:
  /creator-cards:
    post:
      summary: Create Creator Card
      description: Validates and creates a new Creator Card.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRequest'
      responses:
        '200':
          description: Creator Card Created Successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation or business rule error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /creator-cards/{slug}:
    get:
      summary: Public Card Retrieval
      description: Retrieves a single Creator Card by its slug.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: The slug of the card to retrieve.
        - name: access_code
          in: query
          required: false
          schema:
            type: string
          description: Alphanumeric pin code required for private cards.
      responses:
        '200':
          description: Creator Card Retrieved Successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeRetrieval'
        '403':
          description: Access code required or incorrect access code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Creator Card not found or is in draft status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      summary: Delete Creator Card
      description: Deletes the card tied to the given slug.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: The slug of the card to delete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - creator_reference
              properties:
                creator_reference:
                  type: string
                  description: Exactly 20 characters identifier.
                  example: crt_8f2k1m9x4p7w3q5z
      responses:
        '200':
          description: Creator Card Deleted Successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelopeDelete'
        '404':
          description: Creator Card not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    Link:
      type: object
      required:
        - title
        - url
      properties:
        title:
          type: string
          example: YouTube Channel
        url:
          type: string
          example: https://youtube.com/@georgecooks
    Rate:
      type: object
      required:
        - name
        - amount
      properties:
        name:
          type: string
          example: IG Story Post
        description:
          type: string
          example: One Instagram story mention
        amount:
          type: integer
          description: Positive minor units (e.g. cents).
          example: 5000000
    ServiceRates:
      type: object
      required:
        - currency
        - rates
      properties:
        currency:
          type: string
          enum: [NGN, USD, GBP, GHS]
        rates:
          type: array
          items:
            $ref: '#/components/schemas/Rate'
    CreatorCard:
      type: object
      required:
        - id
        - title
        - slug
        - creator_reference
        - status
        - access_type
        - created
        - updated
        - deleted
      properties:
        id:
          type: string
          example: 01JG8XYZA2B3C4D5E6F7G8H9J0
        title:
          type: string
          example: George Cooks
        description:
          type: string
          example: George Cooks cooking podcast
        slug:
          type: string
          example: george-cooks
        creator_reference:
          type: string
          example: crt_8f2k1m9x4p7w3q5z
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        service_rates:
          $ref: '#/components/schemas/ServiceRates'
        status:
          type: string
          enum: [draft, published]
        access_type:
          type: string
          enum: [public, private]
        access_code:
          type: string
          nullable: true
          example: A1B2C3
        created:
          type: number
          example: 1767052800000
        updated:
          type: number
          example: 1767052800000
        deleted:
          type: number
          nullable: true
          example: null
    CreateRequest:
      type: object
      required:
        - title
        - creator_reference
        - status
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          maxLength: 500
        slug:
          type: string
          minLength: 5
          maxLength: 50
        creator_reference:
          type: string
          minLength: 20
          maxLength: 20
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
        service_rates:
          $ref: '#/components/schemas/ServiceRates'
        status:
          type: string
          enum: [draft, published]
        access_type:
          type: string
          enum: [public, private]
          default: public
        access_code:
          type: string
          minLength: 6
          maxLength: 6
    SuccessEnvelope:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Creator Card Created Successfully.
        data:
          $ref: '#/components/schemas/CreatorCard'
    SuccessEnvelopeRetrieval:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Creator Card Retrieved Successfully.
        data:
          type: object
          description: Creator Card without access_code.
    SuccessEnvelopeDelete:
      type: object
      required:
        - status
        - message
        - data
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Creator Card Deleted Successfully.
        data:
          $ref: '#/components/schemas/CreatorCard'
    ErrorEnvelope:
      type: object
      required:
        - status
        - message
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Slug is already taken
        code:
          type: string
          example: SL02
